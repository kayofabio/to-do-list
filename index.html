<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO List</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <h1>TO-DO List</h1>
    </header>
    <main>
        <section class="box-list box-to-do">
            <h2>TO-DO</h2>
            <div class="area-itens">
                <ul id="to-do-itens" class="list-itens">
                    <li class="item" draggable="true">Fazer lista de compra</li>
                </ul>
            </div>

            <div class="area-btn">
                <button class="add-item-btn" data-input="to-do-input">Adicionar tarefa</button>
                <button class="clear-itens-btn" data-category-list="to-do-itens" data-confirm="confirm-window">Limpar
                    tarefas</button>
            </div>

            <dialog id="to-do-input" class="area-input">
                <button class="close-window-btn" data-close="to-do-input">X</button>
                <h3 class="input-title">
                    Adicione tarefa a lista TO-DO
                </h3>
                <label>
                    <input type="text" id="to-do-item" placeholder="Atualiazar curriculo">
                    <button class="submit-item" data-category-list="to-do-itens" data-task="to-do-item"
                        data-input="to-do-input">Comfirmar</button>
                </label>
            </dialog>
        </section>
        <section class="box-list box-doing">
            <h2>DOING</h2>
            <div class="area-itens">
                <ul id="doing-itens" class="list-itens">
                    <li class="item" draggable="true">fazer dever de casa</li>
                    <li class="item" draggable="true">Estudar Inglês</li>
                </ul>
            </div>

            <div class="area-btn">
                <button class="add-item-btn" data-input="doing-input">Adicionar tarefa</button>
                <button class="clear-itens-btn" data-category-list="doing-itens" data-confirm="confirm-window">limpar
                    tarefas</button>
            </div>

            <dialog id="doing-input" class="area-input">
                <button class="close-window-btn" data-close="doing-input">X</button>
                <h3 class="input-title">
                    Adicione tarefa a lista DOING
                </h3>
                <label>
                    <input type="text" id="doing-item" placeholder="Atualiazar curriculo">
                    <button class="submit-item" data-category-list="doing-itens" data-task="doing-item"
                        data-input="doing-input">Comfirmar</button>
                </label>
            </dialog>
        </section>
        <section class="box-list box-done">
            <h2>DONE</h2>
            <div class="area-itens">
                <ul id="done-itens" class="list-itens">

                </ul>
            </div>

            <div class="area-btn">
                <button class="add-item-btn" data-input="done-input">Adicionar tarefa</button>
                <button class="clear-itens-btn" data-category-list="done-itens" data-confirm="confirm-window">Limpar
                    tarefas</button>
            </div>

            <dialog id="done-input" class="area-input">
                <button class="close-window-btn" data-close="done-input">X</button>
                <h3 class="input-title">
                    Adicione tarefa a lista DONE
                </h3>
                <label>
                    <input type="text" id="done-item" placeholder="Atualiazar curriculo">
                    <button class="submit-item" data-category-list="done-itens" data-task="done-item"
                        data-input="done-input">Comfirmar</button>
                </label>
            </dialog>
        </section>
        <dialog id="confirm-window" class="area-input">
            <button class="close-window-btn" data-close="confirm-window">X</button>
            <h3 class="input-title">
                Tem certeza que deseja limpar lista de tafera?
            </h3>
            <div class="box-confirm-btns">
                <button class="confirm-btn" data-response="true" data-confirm="confirm-window">Sim</button>
                <button class="confirm-btn" data-response="false" data-confirm="confirm-window">Não</button>
            </div>
        </dialog>
    </main>
    <div class="remove-item">
        remover item
    </div>
    <footer>
        Feito por: <a href="https://github.com/kayofabio" target="_blank" rel="noopener noreferrer">Kayo Fabio</a>
    </footer>
    <script src="assets/js/script.js"></script>
</body>

</html>
