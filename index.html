<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO List</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>TO-DO List</h1>
    </header>
    <main>
        <section class="box-list to-do">
            <h2>TO-DO</h2>
            <div class="area-task">
                <ul>
                    <li class="item" draggable="true">Fazer lista de compra</li>
                </ul>
            </div>
            <button class="add-item">Adicionar tarefa</button>
        </section>
        <section class="box-list doing">
            <h2>DOING</h2>
            <div class="area-task">
                <ul class="task-list">
                    <li class="item" draggable="true">fazer dever de casa</li>
                    <li class="item" draggable="true">Estudar Inglês</li>
                </ul>
            </div>
            <button class="add-item">Adicionar tarefa</button>
        </section>
        <section class="box-list done">
            <h2>DONE</h2>
            <div class="area-task">
                <ul></ul>
            </div>
            <button class="add-item">Adicionar tarefa</button>
        </section>
    </main>
    <footer>
        Feito por: <a href="https://github.com/kayofabio" target="_blank" rel="noopener noreferrer">Kayo Fabio</a>
    </footer>
    <script src="assets/js/script.js"></script>
</body>
</html>
